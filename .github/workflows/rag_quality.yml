name: RAG Quality Gate

# RAG 관련 파일이 바뀐 PR 에서만 실행(불필요한 비용/실행 방지).
on:
  pull_request:
    paths:
      - "graph/rag_pipeline.py"
      - "services/rag_service.py"
      - "services/rerank_service.py"
      - "services/bm25_service.py"
      - "graph/nodes.py"
      - "scripts/evaluate_rag.py"
      - "scripts/ci_fixtures/**"
  workflow_dispatch: {}   # 수동 실행도 허용

jobs:
  ragas-eval:
    runs-on: ubuntu-latest

    # [Option 2] 운영 인프라에 접근하지 않는다.
    # ChromaDB 를 러너 안에서 '서비스 컨테이너'로 띄워 격리 평가한다.
    services:
      chromadb:
        image: chromadb/chroma:0.6.3
        ports:
          - 8001:8000   # 컨테이너 8000 → 러너 8001(프로젝트 기본 CHROMA_PORT)

    env:
      # CI 격리 환경 설정 — 운영 .env 와 무관, 운영 DB/Chroma 접근 없음
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CHROMA_HOST: localhost
      CHROMA_PORT: "8001"
      RERANK_ENABLED: "false"     # CI 비용 절감(필요 시 Cohere 키 주입 후 true)
      BM25_ENABLED: "false"
      CLIP_SERVING_ENABLED: "false"
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ragas==0.3.9 "langchain-community<0.4" datasets   # 평가 전용(런타임 의존성 아님)
          # [버그 회피] ragas>=0.4 는 langchain_community.chat_models.vertexai(이미
          # 삭제된 경로)를 참조해 import 자체가 실패하는 알려진 버그가 있다
          # (ragas GitHub issue #2745). 0.3.9 는 이 문제가 없어 버전을 고정한다.
          # 다만 langchain-community 자체도 0.4 부터 vertexai 서브모듈을 제거해서,
          # ragas 버전만 낮춰도 langchain-community 를 최신으로 깔면 같은 에러가
          # 재현된다 — 이슈에서 확인된 정상 조합(langchain-community 0.3.x)에 맞춰
          # 같이 고정한다.

      - name: Wait for ChromaDB
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8001/api/v2/heartbeat; then
              echo "ChromaDB ready"; break
            fi
            echo "waiting chromadb... ($i)"; sleep 2
          done

      - name: Index CI fixtures (격리된 픽스처 → 로컬 ChromaDB)
        run: python -m scripts.ci_index_fixtures

      - name: Run RAGAs quality gate
        run: |
          python -m scripts.evaluate_rag \
            --dataset scripts/ci_fixtures/eval_dataset.json \
            --ci \
            --threshold-faithfulness 0.60 \
            --threshold-answer-relevancy 0.60
        # [운영 팁] 처음엔 임계값을 보수적으로(0.6) 잡아 베이스라인을 확보한 뒤
        #          실측 점수를 보고 점진적으로 올린다. Context Precision 은
        #          재랭킹(RERANK_ENABLED=true)과 함께 검사하는 것을 권장.